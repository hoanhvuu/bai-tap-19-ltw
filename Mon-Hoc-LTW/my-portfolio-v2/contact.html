<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - Hồ Anh Vũ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-links">
                <a href="index.html">Trang chủ</a>
                <a href="about.html">Giới thiệu</a>
                <a href="contact.html">Liên hệ</a>
            </div>
            <button id="dark-mode-toggle">Giao diện tối</button>
        </div>
    </nav>

    <header class="animate-on-scroll">
        <h1>Kết nối với tôi</h1>
        <p>Hãy để lại lời nhắn nếu bạn muốn hợp tác hoặc trao đổi công việc</p>
    </header>

    <section class="animate-on-scroll">
        <h2>Gửi tin nhắn</h2>
        <form action="https://formspree.io/f/xoqgkyre" method="POST" class="contact-form">
            <input type="text" name="name" placeholder="Họ và tên của bạn" required>
            <input type="email" name="_replyto" placeholder="Email liên hệ" required>
            <textarea name="message" rows="5" placeholder="Nội dung tin nhắn" required></textarea>
            <button type="submit">Gửi tin nhắn</button>
        </form>
    </section>

    <footer>
        <p>© 2026 Hồ Anh Vũ. Bảo lưu mọi quyền.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
